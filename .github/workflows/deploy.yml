name: Deploy Hostinger

# Builds AND prerenders the site in CI (where Chromium is available), then ships
# the finished dist/ to Hostinger over FTPS. Hostinger no longer builds from
# source, so the prerendered HTML that AI crawlers need is what actually goes live.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

jobs:
  deploy:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Build + prerender
        run: npm run build:prerender

      # The FTP action requires server-dir to end with "/". Normalize the secret
      # so the deploy works whether or not it was stored with a trailing slash.
      - name: Resolve server dir (ensure trailing slash)
        id: ftpdir
        env:
          RAW_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          dir="${RAW_DIR%/}/"
          echo "::add-mask::$dir"
          echo "dir=$dir" >> "$GITHUB_OUTPUT"

      - name: Deploy prebuilt site to Hostinger over FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ steps.ftpdir.outputs.dir }}
          protocol: ftps
          # Ship runtime files + the prebuilt/prerendered dist ONLY. Keeping source
          # and build tooling off the server means Hostinger can't rebuild and
          # overwrite the prerendered HTML. Overriding `exclude` replaces the
          # action's default, so .git / node_modules are re-listed here.
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
            src/**
            public/**
            e2e/**
            scripts/**
            test-results/**
            playwright-report/**
            deploy-artifacts/**
            **/.DS_Store
            **/*.log
            .env
            .env.*
            *.local
            index.html
            vite.config.ts
            tsconfig*.json
            playwright.config.ts
            .oxlintrc.json
            *.md
