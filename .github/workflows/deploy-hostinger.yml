name: Deploy Hostinger

# Runs when a PR is merged to main (push) or when triggered manually.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-hostinger
  cancel-in-progress: false

jobs:
  test:
    name: Smoke tests
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Playwright smoke tests
        run: npx playwright test
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    name: Deploy to Hostinger
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Normalize FTP server directory
        id: ftp_dir
        env:
          RAW_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          if [ -z "$RAW_DIR" ]; then
            echo "::error::FTP_SERVER_DIR secret is empty"
            exit 1
          fi
          # FTP-Deploy-Action requires a trailing slash
          DIR="${RAW_DIR%/}/"
          echo "server_dir=$DIR" >> "$GITHUB_OUTPUT"
          echo "Using server-dir ending in / (length ${#DIR})"

      - name: Sync source to Hostinger (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          # hPanel Node.js application root (trailing / enforced above)
          server-dir: ${{ steps.ftp_dir.outputs.server_dir }}
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.cursor/**
            **/node_modules/**
            **/dist/**
            **/dist-ssr/**
            **/deploy-artifacts/**
            **/e2e/**
            **/test-results/**
            **/playwright-report/**
            **/blob-report/**
            **/playwright/.cache/**
            **/.DS_Store
            **/.env
            **/.env.*
            !**/.env.example
            **/*.local
            **/DEPLOY-HOSTINGER.md
            **/README.md
            **/playwright.config.ts
            **/.ftp-deploy-exclude
            **/scripts/**

      - name: Post-deploy checklist
        run: |
          {
            echo "## Hostinger deploy"
            echo ""
            echo "Source synced for commit \`${GITHUB_SHA}\`."
            echo ""
            echo "If the Node app did not auto-rebuild, in hPanel:"
            echo "1. Run NPM Install (when dependencies change)"
            echo "2. Run NPM Build / Deploy"
            echo "3. Restart the Node.js app"
          } >> "$GITHUB_STEP_SUMMARY"
